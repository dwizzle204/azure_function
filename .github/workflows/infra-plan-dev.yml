name: infra-plan-dev

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-dev:
    uses: your-org/github_pipeline_governance/.github/workflows/infra-plan.yml@v1.0.0
    with:
      tf_cloud_organization: replace-with-tfc-organization
      tf_workspace: ${{ github.event.repository.name }}-dev
      config_directory: ./infra
      tfvars_file: infra/env/dev.tfvars
      summary_title: Terraform Cloud Dev Speculative Plan
    secrets:
      tf_api_token: ${{ secrets.TF_API_TOKEN_DEV_PLAN }}
