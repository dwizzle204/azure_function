name: infra-plan-prod

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan-prod:
    uses: your-org/github_pipeline_governance/.github/workflows/infra-plan.yml@v1.0.0
    with:
      tf_cloud_organization: replace-with-tfc-organization
      tf_workspace: ${{ github.event.repository.name }}-prod
      config_directory: ./infra
      tfvars_file: infra/env/prod.tfvars
      summary_title: Terraform Cloud Prod Speculative Plan
    secrets:
      tf_api_token: ${{ secrets.TF_API_TOKEN_PROD_PLAN }}
