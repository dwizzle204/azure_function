name: app-release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "VERSION"
      - ".github/workflows/app-release.yml"

permissions:
  contents: read

jobs:
  build-and-publish:
    uses: your-org/github_pipeline_governance/.github/workflows/app-release.yml@v1.0.0
    with:
      app_dir: src/function_app
      version_file: VERSION
      artifact_prefix: function-app
      retention_days: 30
      python_version: "3.11"
