name: infra-apply-dev

on:
  push:
    branches:
      - main
    paths:
      - "infra/*.tf"
      - "infra/modules/**"
      - "infra/env/dev.tfvars"
      - ".github/workflows/infra-apply-dev.yml"

permissions:
  contents: read

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

jobs:
  terraform-apply-dev:
    uses: your-org/github_pipeline_governance/.github/workflows/infra-apply.yml@v1.0.0
    with:
      tf_cloud_organization: replace-with-tfc-organization
      tf_workspace: ${{ github.event.repository.name }}-dev
      config_directory: ./infra
      tfvars_file: infra/env/dev.tfvars
      apply_comment: Automated dev apply from main branch
      environment_name: dev
    secrets:
      tf_api_token: ${{ secrets.TF_API_TOKEN_DEV_APPLY }}
