name: app-deploy-dev

on:
  workflow_dispatch:
    inputs:
      function_app_name_dev:
        description: "Dedicated dev Azure Function App name"
        required: true
        type: string
      git_ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-deploy-dev-${{ inputs.function_app_name_dev }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    uses: your-org/github_pipeline_governance/.github/workflows/app-deploy-dev.yml@v1.0.0
    with:
      function_app_name_dev: ${{ inputs.function_app_name_dev }}
      git_ref: ${{ inputs.git_ref }}
      app_dir: src/function_app
      environment_name: dev
    secrets:
      azure_client_id_dev_deploy: ${{ secrets.AZURE_CLIENT_ID_DEV_DEPLOY }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
