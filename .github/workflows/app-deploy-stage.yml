name: app-deploy-stage

on:
  workflow_dispatch:
    inputs:
      artifact_version:
        description: "Version suffix from app-release artifact (example: 1.2.3-a1b2c3d)"
        required: true
        type: string
      source_run_id:
        description: "GitHub Actions run_id that produced the artifact"
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

concurrency:
  group: app-stage-deploy-${{ vars.PROD_FUNCTION_APP_NAME }}-${{ vars.PROD_STAGE_SLOT_NAME }}
  cancel-in-progress: false

jobs:
  deploy-stage:
    uses: your-org/github_pipeline_governance/.github/workflows/app-deploy-stage.yml@v1.0.0
    with:
      artifact_version: ${{ inputs.artifact_version }}
      source_run_id: ${{ inputs.source_run_id }}
      prod_function_app_name: ${{ vars.PROD_FUNCTION_APP_NAME }}
      prod_stage_slot_name: ${{ vars.PROD_STAGE_SLOT_NAME }}
      artifact_prefix: function-app
      expected_release_workflow_name: app-release
      expected_release_branch: main
      environment_name: production
    secrets:
      azure_client_id_deploy: ${{ secrets.AZURE_CLIENT_ID_DEPLOY }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      github_token: ${{ secrets.GITHUB_TOKEN }}
