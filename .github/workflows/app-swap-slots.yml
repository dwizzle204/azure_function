name: app-swap-slots

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-slot-swap-${{ vars.PROD_FUNCTION_APP_NAME }}
  cancel-in-progress: false

jobs:
  swap-stage-to-production:
    uses: your-org/github_pipeline_governance/.github/workflows/app-swap-slots.yml@v1.0.0
    with:
      prod_function_app_name: ${{ vars.PROD_FUNCTION_APP_NAME }}
      prod_resource_group_name: ${{ vars.PROD_RESOURCE_GROUP_NAME }}
      source_slot_name: ${{ vars.PROD_STAGE_SLOT_NAME }}
      target_slot_name: production
      environment_name: production
    secrets:
      azure_client_id_promotion: ${{ secrets.AZURE_CLIENT_ID_PROMOTION }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
