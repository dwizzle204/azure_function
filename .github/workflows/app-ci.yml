name: app-ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    uses: your-org/github_pipeline_governance/.github/workflows/app-ci.yml@v1.0.0
    with:
      app_dir: src/function_app
      tests_dir: tests
      function_name: HttpExample
      python_version: "3.11"
      node_version: "20"
