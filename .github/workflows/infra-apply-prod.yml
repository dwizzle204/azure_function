name: infra-apply-prod

on:
  workflow_dispatch:
    inputs:
      change_request_number:
        description: "Approved change request number (example: CR-12345)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  terraform-apply-prod:
    uses: your-org/github_pipeline_governance/.github/workflows/infra-apply.yml@v1.0.0
    with:
      tf_cloud_organization: replace-with-tfc-organization
      tf_workspace: ${{ github.event.repository.name }}-prod
      config_directory: ./infra
      tfvars_file: infra/env/prod.tfvars
      apply_comment: "${{ format('Manual prod apply (change request): {0}', inputs.change_request_number) }}"
      environment_name: production
    secrets:
      tf_api_token: ${{ secrets.TF_API_TOKEN_PROD_APPLY }}
